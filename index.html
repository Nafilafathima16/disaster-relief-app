<!DOCTYPE html>
<html>
<head>
  <title>Disaster Relief App</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f0f8ff;
      text-align: center;
    }
    h1 {
      color: darkblue;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🌍 Disaster Relief Coordination Platform</h1>

<div class="box">
  <h2>📍 Your Location</h2>
  <p id="location">Click below to get location</p>
  <button onclick="getLocation()">Get Location</button>
</div>

<div class="box">
  <h2>📦 Resources Needed</h2>
  <input type="text" id="resource" placeholder="Food / Water / Medicine">
  <button onclick="addResource()">Add</button>
  <ul id="list"></ul>
</div>

<div class="box">
  <h2>👥 Volunteers</h2>
  <input type="text" id="volunteer" placeholder="Enter your name">
  <button onclick="addVolunteer()">Join</button>
  <ul id="volunteers"></ul>
</div>

<script>
function getLocation() {
  navigator.geolocation.getCurrentPosition(function(position) {
    document.getElementById("location").innerText =
      "Latitude: " + position.coords.latitude +
      ", Longitude: " + position.coords.longitude;
  });
}

function addResource() {
  let item = document.getElementById("resource").value;
  let li = document.createElement("li");
  li.textContent = item;
  document.getElementById("list").appendChild(li);
}

function addVolunteer() {
  let name = document.getElementById("volunteer").value;
  let li = document.createElement("li");
  li.textContent = name;
  document.getElementById("volunteers").appendChild(li);
}
</script>

</body>
</html>
